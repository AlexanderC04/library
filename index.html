<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="images/favicon-AlexanderC_04.png" />
    <title>Library | AlexanderC_04</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="library">
    <div class="form">
      <div class="">
        <button class="close-form">
          <img src="images/close-circle.svg" alt="Close Circle Icon" />
        </button>
      </div>
      <form class="form__add-book">
        <h2 class="form__description-title">New Book</h2>
        <div class="form__item form__title">
          <label class="form__label" for="title">Book Title:</label>
          <input
            class="form__input"
            type="text"
            id="title"
            name="title"
            required
          />
        </div>
        <div class="form__item form__author">
          <label class="form__label" for="author">Author Name:</label>
          <input
            class="form__input"
            type="text"
            id="author"
            name="author"
            required
          />
        </div>
        <div class="form__item form__pages">
          <label class="form__label" for="pages">Number of pages:</label>
          <input
            class="form__input"
            type="number"
            id="pages"
            name="pagesNumber"
            required
          />
        </div>
        <div class="form__item form__status">
          <legend class="form__label">Status:</legend>
          <div>
            <input
              class="form__input"
              type="radio"
              id="status-read"
              name="status"
              value="Read"
              required
            />
            <label class="form__label" for="status-read">Read</label>
          </div>
          <div>
            <input
              class="form__input"
              type="radio"
              id="status-no-read"
              name="status"
              value="No read"
            />
            <label class="form__label" for="status-no-read">No read</label>
          </div>
        </div>
        <button id="form-submit-btn" class="form__btn" type="submit">
          Add book
        </button>
      </form>
    </div>

    <header class="header lirary__header">
      <nav class="header__nav">
        <div class="header__logo">
          <img
            class="header__icon book-logo"
            src="images/bookshelf.svg"
            alt="Bookshelf"
          />
          <h1 class="header__title">Library</h1>
        </div>
        <div class="header__action">
          <button class="header__add-book btn__add-book">
            <p>Add Book</p>
            <img
              class="header__icon add-book-logo"
              src="images/book-plus.svg"
              alt="Book plus icon"
            />
          </button>
        </div>
      </nav>
    </header>
    <main class="main">
      <div class="book-container"></div>
    </main>
    <div class="overlay"></div>
    <script src="script.js"></script>
  </body>
</html>
